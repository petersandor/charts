image:
  pullPolicy: IfNotPresent
  repository: plexripper/plexripper
  tag: 0.29.1@sha256:6ce194070a3bb5aa931d9a859842bddcef4669fe331bfdbc140b39c10034e0df
service:
  main:
    ports:
      main:
        protocol: http
        targetPort: 7000
        port: 7000
workload:
  main:
    podSpec:
      containers:
        main:
          probes:
            liveness:
              enabled: true
              type: http
            readiness:
              enabled: true
              type: http
            startup:
              enabled: true
              type: http
persistence:
  config:
    enabled: true
    mountPath: /Config
  downloads:
    enabled: true
    mountPath: /Downloads
portal:
  open:
    enabled: true
